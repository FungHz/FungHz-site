  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      width: 100%;
    }

    body {
      background: linear-gradient(to bottom, #0a0a1a 0%, #1a1a3a 30%, #0d0d2b 60%, #050510 100%);
      min-height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: 'Courier New', Courier, monospace;
      position: relative;
      overflow: hidden;
    }

    /* Stars container */
    .stars-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle var(--duration) ease-in-out infinite;
      animation-delay: var(--delay);
    }

    @keyframes twinkle {
      0%, 100% {
        opacity: var(--min-opacity);
        transform: scale(1);
      }
      50% {
        opacity: 1;
        transform: scale(1.2);
      }
    }

    @keyframes shootingStar {
      0% {
        left: -50px;
        top: 100%;
        opacity: 0;
      }
      20% {
        opacity: 1;
      }
      80% {
        opacity: 1;
      }
      100% {
        left: calc(100vw + 50px);
        top: -50px;
        opacity: 0;
      }
    }

    .shooting-star {
      position: fixed;
      width: 3px;
      height: 3px;
      background: white;
      border-radius: 50%;
      box-shadow: 0 0 20px 2px rgba(255, 255, 255, 0.8), 0 0 40px 4px rgba(100, 150, 255, 0.6);
      pointer-events: none;
      z-index: 1;
      animation: shootingStar 2s ease-in forwards;
      transform: rotate(50deg);
    }

    /* Subtle cosmic glow overlay */
    .cosmic-glow {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(ellipse at 20% 20%, rgba(75, 0, 130, 0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(0, 0, 80, 0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(25, 25, 112, 0.05) 0%, transparent 70%);
      pointer-events: none;
      z-index: 1;
    }

    .content-wrapper {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      flex: 1;
      width: 100%;
      padding: 20px;
    }

    .logo {
      max-width: 400px;
      height: auto;
    }

    .bottom-info {
      position: absolute;
      bottom: 20px;
      text-align: center;
      color: #ffffff;
      line-height: 1.2;
      z-index: 2;
    }

    .bottom-info div {
      font-size: 14px;
      letter-spacing: 1px;
      margin-top: 2px;
      color: #ffffff;
    }

    .ufo {
      position: fixed;
      width: 60px;
      height: 40px;
      cursor: pointer;
      z-index: 3;
      user-select: none;
      pointer-events: auto;
    }

    .ufo-body {
      width: 100%;
      height: 24px;
      background: linear-gradient(to bottom, #444444, #222222);
      border-radius: 50% 50% 40% 40%;
      position: relative;
      box-shadow: 0 0 15px rgba(100, 200, 100, 0.4);
    }

    .ufo-light {
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      height: 12px;
      background: linear-gradient(to bottom, rgba(100, 255, 100, 0.6), rgba(100, 255, 100, 0.2));
      border-radius: 0 0 20px 20px;
      animation: lightPulse 1s ease-in-out infinite;
    }

    @keyframes lightPulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    .alien {
      position: absolute;
      width: 24px;
      height: 32px;
      top: 2px;
      left: 50%;
      transform: translateX(-50%);
    }

    .alien-head {
      width: 16px;
      height: 18px;
      background: #00dd00;
      border-radius: 50% 50% 40% 40%;
      margin: 0 auto;
      position: relative;
    }

    .alien-eye {
      position: absolute;
      width: 4px;
      height: 6px;
      background: #000000;
      border-radius: 50%;
      top: 6px;
    }

    .alien-eye:first-child {
      left: 3px;
    }

    .alien-eye:last-child {
      right: 3px;
    }

    .alien-body {
      width: 14px;
      height: 10px;
      background: #00bb00;
      margin: 2px auto 0;
      border-radius: 40%;
    }

    .alien-arm {
      position: absolute;
      width: 3px;
      height: 8px;
      background: #00dd00;
      top: 12px;
      animation: armWave 0.6s ease-in-out infinite;
    }

    .alien-arm:first-child {
      left: 2px;
    }

    .alien-arm:last-child {
      right: 2px;
      animation-delay: 0.3s;
    }

    @keyframes armWave {
      0%, 100% { transform: rotate(-20deg); }
      50% { transform: rotate(20deg); }
    }
  </style>

  <script>
    // Generate stars
    function createStars() {
      const container = document.getElementById('starsContainer');
      const starCount = 200;

      for (let i = 0; i < starCount; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        
        // Random position
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        
        // Random size (very tiny: 1-2px)
        const size = Math.random() * 1.5 + 0.5;
        star.style.width = size + 'px';
        star.style.height = size + 'px';
        
        // Random animation properties
        star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
        star.style.setProperty('--delay', (Math.random() * 3) + 's');
        star.style.setProperty('--min-opacity', Math.random() * 0.3 + 0.2);
        
        container.appendChild(star);
      }
    }

    createStars();

    // Shooting star every 5 seconds
    function createShootingStar() {
      const container = document.getElementById('starsContainer');
      const shootingStar = document.createElement('div');
      shootingStar.className = 'shooting-star';
      container.appendChild(shootingStar);
      
      // Remove the element after animation completes
      setTimeout(() => shootingStar.remove(), 2000);
    }

    // Launch shooting star every 10 seconds
    setInterval(createShootingStar, 10000);
    // Launch first one immediately
    createShootingStar();

    // Element SDK configuration
    const defaultConfig = {
      tagline: 'DIGITAL MARKETING SERVICES',
      email: 'INFO@FUNGHZ.COM',
      phone: 'WHATSAPP +447 732 399 299',
      company_info: 'KVK 98582682 BTW NL005341509B80'
    };

    async function onConfigChange(config) {
      document.getElementById('tagline').textContent = config.tagline || defaultConfig.tagline;
      document.getElementById('email').textContent = config.email || defaultConfig.email;
      document.getElementById('phone').textContent = config.phone || defaultConfig.phone;
      document.getElementById('company_info').textContent = config.company_info || defaultConfig.company_info;
    }

    function mapToCapabilities(config) {
      return {
        recolorables: [],
        borderables: [],
        fontEditable: undefined,
        fontSizeable: undefined
      };
    }

    function mapToEditPanelValues(config) {
      return new Map([
        ['tagline', config.tagline || defaultConfig.tagline],
        ['email', config.email || defaultConfig.email],
        ['phone', config.phone || defaultConfig.phone],
        ['company_info', config.company_info || defaultConfig.company_info]
      ]);
    }

    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange,
        mapToCapabilities,
        mapToEditPanelValues
      });
    }

    // UFO with alien movement logic
    function initUFOMovement() {
      const ufo = document.getElementById('ufo');
      let x = window.innerWidth / 2;
      let y = window.innerHeight / 2;
      const speed = 100; // pixels per jump
      const jumpInterval = 1000; // milliseconds between jumps

      function moveToRandomPosition() {
        // Generate random position with some padding from edges
        const padding = 80;
        const maxX = window.innerWidth - padding;
        const maxY = window.innerHeight - padding;
        
        x = Math.random() * (maxX - padding) + padding;
        y = Math.random() * (maxY - padding) + padding;
        
        ufo.style.left = x + 'px';
        ufo.style.top = y + 'px';
      }

      // Jump away from cursor
      document.addEventListener('mousemove', (e) => {
        const mouseX = e.clientX;
        const mouseY = e.clientY;
        
        // Calculate distance from cursor to UFO
        const distX = x - mouseX;
        const distY = y - mouseY;
        const distance = Math.sqrt(distX * distX + distY * distY);
        
        // If cursor is within 150 pixels, jump away
        if (distance < 150) {
          moveToRandomPosition();
        }
      });

      // Random jump every so often
      setInterval(moveToRandomPosition, jumpInterval);

      // Initial position
      moveToRandomPosition();
    }

    initUFOMovement();
  </script>
